<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <title>Componente do cartão de perfil</title>
</head>
<body>
    <main class="container">
        <div class="cartao">
            <div class="perfil-informacao">
                <img src="src/images/image-alberdam.jpg" alt="imagem de perfil">
                <p>Alberdam Santiago <span class="idade">37</span></p>
                <span class="cidade">Niterói</span>
            </div>
              <hr>
            <ul class="perfil-numeros">

                  <li class="informacao">
                      <p class="contador">80k</p>
                      <span class="tipo-contador">seguidores</span>
                  </li>
                  <li class="informacao">
                      <p class="contador">803k</p>
                      <span class="tipo-contador">gostei</span>
                  </li>
                  <li class="informacao">
                      <p class="contador">1.4k</p>
                      <span class="tipo-contador">fotos</span>
                  </li>
            </ul>

          </div>

    </main>
  
 

  

</body>
</html>
