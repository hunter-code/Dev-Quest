<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <title>Aplicativo gerador de conselhos</title>
</head>
<body>

    <main class="cartao">
        <div class="conselho">
            <h2 class="conselho-id"> Conselho #117 </h2>
            <p class="descricao-conselho"> "É fácil sentar e perceber, o difícil é levantar e agir." </p>
            <picture>
                <source srcset="./src/images/pattern-divider-mobile.svg" media="(max-width: 768px)">
                <img src="./src/images/pattern-divider-desktop.svg" alt="Divisor de padrões">
            </picture>
            <button class="atualizacao-conselho">
                <img src="./src/images/icon-dice.svg" alt="Ícone de dados">
            </button>
        </div>
    </main>
</body>
</html>
</html>
    <script src="./src/js/script.js"></script>
</body>
</html>
